    <div class="reveal">
      <div class="slides">
        <section>
          <h2>Point of View</h2>
          <p>
            Press <strong>ESC</strong> to enter the slide overview.
          </p>
          <div>
            <img id="example" class="canvasxpress" width="200" class="example" src="https://canvasxpress.org/images/ex/Ex-bar-3.png" alt="Click for Interactive">
          </div>
        </section>
        <section>Slide 1</section>
        <section>Slide 2</section>
      </div>
    </div>

    <script src="lib/js/head.min.js"></script>
    <script src="js/reveal.js"></script>

    <script>

      // More info https://github.com/hakimel/reveal.js#configuration
      Reveal.initialize({
        
        controls: true,
        progress: true,
        history: true,
        center: true,

        transition: 'slide', // none/fade/slide/convex/concave/zoom,

        // Zooming config
        zoomKey: 'shift',
        zoomLevel: 3,
        
        // Set to 1 for CanvasXpress to work properly
        minScale: 1,
        maxScale: 1,

        dependencies: [
          { src: 'lib/js/classList.js', condition: function() { return !document.body.classList; } },
          { src: 'plugin/markdown/marked.js', condition: function() { return !!document.querySelector( '[data-markdown]' ); } },
          { src: 'plugin/markdown/markdown.js', condition: function() { return !!document.querySelector( '[data-markdown]' ); } },
          { src: 'plugin/highlight/highlight.js', async: true, callback: function() { hljs.initHighlightingOnLoad(); } },
          { src: 'plugin/search/search.js', async: true },
          { src: 'plugin/zoom-js/zoom.js', async: true },
          { src: 'plugin/notes/notes.js', async: true }
        ]
      });

      Reveal.addEventListener( 'dblclick', function( event ) {
        var rConfig = Reveal.getConfig();
        var target = event.target;
        var tagName = target.tagName.toLowerCase();
        if (tagName == 'img' && target.className == 'canvasxpress') {
          zoom.out();
          var src = target.src;
          var id = 'cX' + target.id;
          var width = target.width;
          var height = target.height;
          var bounds = target.getBoundingClientRect();
          var canvas = document.createElement('canvas');
          canvas.id = id;
          canvas.width = width;
          canvas.height = height;
          target.parentNode.style.position = 'absolute';
          target.parentNode.style.left = ((rConfig.width * 0.5) - (width * 0.5)) + 'px'; 
          //target.parentNode.style.top = '-88px'; 
          target.parentNode.appendChild(canvas);
          var cx = new CanvasXpress({
            renderTo: id,
            data: src,
            callback : function () {
              setTimeout(function () {
                target.style.display = 'none';
              }, 1000);
            }
          });
        }
      });

    </script>
