    <style>
      div.cx-data img.cx-data-transparent {
        margin: 0px; 
        border: 0px;
        background: rgba(0,0,0,0);
        box-shadow: 0 0 10px rgba(0,0,0,0);
        opacity: 0;
      }
      div.cx-data img.cx-data {
        margin: 0px; 
        border: 0px;
        background: rgba(0,0,0,0);
        box-shadow: 0 0 10px rgba(0,0,0,0);
        -webkit-transition: opacity 1s ease-in-out;
        -moz-transition: opacity 1s ease-in-out;
        -o-transition: opacity 1s ease-in-out;
        transition: opacity 1s ease-in-out;
      }
      div.cx-data:hover:after {
        content: url(https://canvasxpress.org/images/icons2/cx/mouseLeft2.png);
        display: block;
        position: relative;
        top: -100px;
        left: 0px;
      }
      div.cx-destroy img.cx-data {
        margin: 0px; 
        border: 0px;
        background: rgba(0,0,0,0);
        box-shadow: 0 0 10px rgba(0,0,0,0);
      }
      div.cx-data {
        position: absolute;
        width: 100%; 
        top: 0px; 
        left: 0px; 
        margin: 0px;
      }
      div.cx-destroy {
        position: absolute;
        width: 16px;
        height: 16px; 
        top: -40px; 
        left: 0px; 
        margin: 0px;
      }
      div.cx-block {
        position: relative; 
      }
      .side-by-side {
        display: -webkit-flex;
        display: -moz-flex;
        display: flex;
        box-sizing: border-box;
      }
      .side-by-side .side + .side {
         margin-left: 2rem;
      }      
      .side-by-side .side {
        -webkit-flex: 1 0 0;
        -moz-flex: 1 0 0;
        flex: 1 0 0;
      }
    </style>

    <div class="reveal">

        <section>
          <h2>Network Layouts</h2>
          <div class="side-by-side" style="padding-top:5px; font-size:x-large;">
            <div class="side">
              No Data
            </div>
            <div class="side">
              Exp Data
            </div>
          </div>
          <div class="side-by-side">
            <div class="side">
              <div class="cx-block">
                <div class="cx-data">
                  <img class="cx-data" id="keggNoEx" src="./images/keggNoEx.png">
                </div>
              </div>
            </div>
            <div class="side">
              <div class="cx-block">
                <div class="cx-data">
                  <img class="cx-data" id="keggEx" src="./images/keggEx.png">
                </div>
              </div>
            </div>
          </div>
        </section>

        </section>
